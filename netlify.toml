# Netlify Configuration for FaithShield Insurance

[build]
  # No build command needed for static HTML
  command = ""
  publish = "."

# Optional: Set custom headers for better security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;"

# Redirects (optional future use)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
